    <!-- Apply stored theme before React renders to prevent accent-colour flash -->
    <script>
      (function(){
        var t=localStorage.getItem('portfolio-theme')||'yellow';
        var a={yellow:'#E5FE40',red:'#FF3333',blue:'#00D4FF',green:'#00FF41',purple:'#B44FFF',orange:'#FF6B35'};
        var h={yellow:'#CBE02D',red:'#CC2020',blue:'#00A8CC',green:'#00CC34',purple:'#9033CC',orange:'#CC5520'};
        var hex=a[t]||a.yellow;
        var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
        var el=document.documentElement;
        el.setAttribute('data-theme',a[t]?t:'yellow');
        el.style.setProperty('--accent',hex);
        el.style.setProperty('--accent-hover',h[t]||h.yellow);
        el.style.setProperty('--accent-op-05','rgba('+r+','+g+','+b+',0.05)');
        el.style.setProperty('--accent-op-10','rgba('+r+','+g+','+b+',0.10)');
        el.style.setProperty('--accent-op-30','rgba('+r+','+g+','+b+',0.30)');
        el.style.setProperty('--accent-op-40','rgba('+r+','+g+','+b+',0.40)');
        el.style.setProperty('--accent-op-60','rgba('+r+','+g+','+b+',0.60)');
      })();
    </script>
